<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact Us - VG TOOLS</title>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(to right, #00c6ff, #0072ff);
      color: white;
      padding: 2rem;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
    }
    form {
      background: rgba(255,255,255,0.1);
      padding: 2rem;
      border-radius: 12px;
      backdrop-filter: blur(10px);
      width: 100%;
      max-width: 400px;
    }
    input, textarea {
      width: 100%;
      padding: 0.75rem;
      margin-top: 1rem;
      border: none;
      border-radius: 6px;
      font-size: 1rem;
    }
    button {
      margin-top: 1rem;
      background: white;
      color: #0072ff;
      font-weight: bold;
      padding: 0.75rem;
      width: 100%;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }
    a {
      color: white;
      text-decoration: none;
      margin-top: 2rem;
      display: inline-block;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <h1>Contact Us</h1>
  <form action="https://formspree.io/f/mrbkvzpj" method="POST">
    <input type="email" name="email" placeholder="Your Email" required />
    <textarea name="message" rows="5" placeholder="Your Message" required></textarea>
    <button type="submit">Send Message</button>
  </form>
  <a href="https://vgtools.xyz">Home</a>
</body>
</html>
